<!DOCTYPE html>
<html lang="">
<head>
    <title>'s CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 80%;
            display: flex;
            margin: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
        }
        .left, .right {
            padding: 20px;
        }
        .left {
            width: 20%;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        .right {
            width: 70%;
        }
        .header h1 {
            margin: 0;
        }
        .header img {
            max-width: 100px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h2 {
            margin-top: 0;
        }
        .skills ul {
            list-style: none;
            padding: 0;
        }
        .skills li {
            background: #eee;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .contact-info {
            margin-top: 20px;
        }
        .contact-info a {
            text-decoration: none;
            color: inherit;
            margin: 0 5px;
        }
        .contact-info .bi-instagram,
        .contact-info .bi-facebook,
        .contact-info .bi-github {
            font-size: 1.5rem;
            vertical-align: middle;
        }
        .email-link {
            color: blue !important;
            text-decoration: underline !important;
        }
        .project-images {
            justify-content: space-around;
            margin-top: 10px;
        }
        .project-images img {
            max-width: 45%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        
            <div class="right">
                <h1>No CV Found</h1>
                <p>No profile data available. Please add a profile in the admin panel.</p>
            </div>
        
    </div>
</body>
</html>
